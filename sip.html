<!DOCTYPE html>
<html>
<head>
<title>SIP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>SIP Calculator</h2>

<input id="m" placeholder="Monthly Investment"><br><br>
<input id="r" placeholder="Rate"><br><br>
<input id="t" placeholder="Years"><br><br>

<button onclick="sip()">Calculate</button>

<p id="res"></p>

<script>
function sip() {
 let M = m.value;
 let R = r.value/12/100;
 let N = t.value*12;

 let FV = M * ((Math.pow(1+R,N)-1)/R)*(1+R);

 res.innerText = "Future Value: " + FV.toFixed(2);
}
</script>

</body>
</html>
